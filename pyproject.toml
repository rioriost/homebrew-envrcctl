[project]
name = "envrcctl"
version = "0.0.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
]

[project.scripts]
envrcctl = "envrctl.main:main"

[build-system]
requires = ["hatchling>=1.24.2"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/envrctl"]

[tool.hatch.build.targets.sdist]
include = ["src/envrctl/**", "README.md", "pyproject.toml"]
